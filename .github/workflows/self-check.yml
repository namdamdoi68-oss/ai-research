name: Bot Self-Check

on:
  schedule:
    - cron: "0 12 * * 0"   # 每周日 UTC 12:00
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  self-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Workflow YAML
        run: |
          echo "=== Checking workflow files ==="
          for f in .github/workflows/*.yml; do
            if [ -f "$f" ]; then
              echo -n "  $f: "
              python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>&1 && echo "OK" || echo "BROKEN"
            fi
          done

      - name: Validate JSON Ledgers
        run: |
          echo "=== Checking JSON files ==="
          for f in BOUNTY_LEDGER.json TIME_LEDGER.json; do
            if [ -f "$f" ]; then
              echo -n "  $f: "
              python3 -c "import json; json.load(open('$f'))" 2>&1 && echo "VALID" || echo "CORRUPT"
            fi
          done

      - name: Check Workflow Completeness
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Expected workflows
            const expected = [
              "auto-create-tasks", "auto-merge", "bounty-payout",
              "capture-submission", "daily-monitor", "evaluate-submission",
              "hall-of-fame", "issue-claim", "notifications", "pr-review",
              "review-new-issue", "sandbox-verify", "spam-detection",
              "stale-cleanup", "stats-dashboard", "task-capacity",
              "update-time-leaderboard", "weekly-report", "achievements"
            ];

            const { data: workflows } = await github.rest.actions.listRepoWorkflows({ owner, repo });
            const actual = workflows.workflows.map(w => w.name.toLowerCase().replace(/[^a-z-]/g, ""));

            const missing = expected.filter(e => !actual.some(a => a.includes(e)));

            let report = "## 🤖 Bot 自检报告\n\n";
            report += `| 检查项 | 状态 |\n`;
            report += `|:-----|:----:|\n`;

            // Check each
            for (const w of expected) {
              const found = actual.some(a => a.includes(w));
              report += `| ${w} | ${found ? "✅" : "❌"} |\n`;
            }

            report += `\n`;
            if (missing.length > 0) {
              report += `**缺失**: ${missing.join(", ")}\n\n`;
              report += `⚠️ 部分 Workflow 未找到，可能存在配置问题。\n`;
            } else {
              report += "✅ 所有 Workflow 正常运行\n";
            }

            report += `\n> 下次自检: ${new Date(Date.now() + 7*86400000).toISOString().slice(0, 10)}\n`;
            report += `---\n*🤖 Bot Self-Check*\n`;

            // Create/update self-check issue
            const { data: existing } = await github.rest.issues.listForRepo({
              owner, repo, state: "open", labels: "bot-health", per_page: 1
            });

            if (existing.length > 0) {
              await github.rest.issues.update({
                issue_number: existing[0].number, owner, repo,
                title: `🤖 Bot 健康检查 (${new Date().toISOString().slice(0, 10)})`,
                body: report
              });
            } else {
              await github.rest.issues.create({
                owner, repo,
                title: `🤖 Bot 健康检查`,
                body: report,
                labels: ["bot-health"]
              });
            }

            if (missing.length > 0) {
              core.setFailed("Missing workflows: " + missing.join(", "));
              return;
            }
