name: Generate SVG Leaderboard
on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const fs = require("fs");

            // Read bounty ledger
            let ledger = {};
            try {
              const { data: f } = await github.rest.repos.getContent({ owner, repo, path: "BOUNTY_LEDGER.json" });
              ledger = JSON.parse(Buffer.from(f.content, "base64").toString());
            } catch (e) {}

            // Sort by total bounty
            const sorted = Object.entries(ledger)
              .filter(([_, d]) => d.total > 0)
              .sort((a, b) => b[1].total - a[1].total);

            const medals = ["🥇", "🥈", "🥉"];
            let rows = "";
            for (let i = 0; i < Math.min(sorted.length, 10); i++) {
              const [user, data] = sorted[i];
              const badge = medals[i] || "#" + (i + 1);
              const tasks = data.task_count || (data.submissions ? data.submissions.length : 0);
              rows += `<tr><td>${badge}</td><td>@${user}</td><td>$${data.total}</td><td>${tasks}</td></tr>`;
            }

            const svg = `<?xml version="1.0" encoding="UTF-8"?>
            <svg xmlns="http://www.w3.org/2000/svg" width="600" height="${400 + sorted.length * 30}" viewBox="0 0 600 ${400 + sorted.length * 30}">
              <rect width="100%" height="100%" fill="#0d1117"/>
              <text x="20" y="40" fill="#58a6ff" font-size="24" font-weight="bold">🏆 AI Research Leaderboard</text>
              <text x="20" y="65" fill="#8b949e" font-size="14">Token disclaimer: Virtual tokens, not redeemable for cash or crypto</text>
              <line x1="20" y1="80" x2="580" y2="80" stroke="#30363d"/>
              <text x="20" y="110" fill="#c9d1d9" font-size="14" font-weight="bold">Rank</text>
              <text x="100" y="110" fill="#c9d1d9" font-size="14" font-weight="bold">Contributor</text>
              <text x="300" y="110" fill="#c9d1d9" font-size="14" font-weight="bold">Bounty</text>
              <text x="430" y="110" fill="#c9d1d9" font-size="14" font-weight="bold">Tasks</text>
              <line x1="20" y1="120" x2="580" y2="120" stroke="#30363d"/>
              ${rows.split("<tr>").slice(1).map((row, i) => {
                const y = 150 + i * 30;
                return `<text x="20" y="${y}" fill="#c9d1d9">${row.replace(/<[^>]+>/g, "")}</text>`;
              }).join("\\n")}
              <text x="20" y="${400 + sorted.length * 30 - 20}" fill="#484f58" font-size="11">Last updated: ${new Date().toISOString().slice(0, 10)} | Bot auto-generated</text>
            </svg>`;

            let svgSha;
            try {
              const { data: svgFile } = await github.rest.repos.getContent({ owner, repo, path: "docs/leaderboard.svg" });
              svgSha = svgFile.sha;
            } catch (e) { svgSha = undefined; }
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path: "docs/leaderboard.svg",
              message: "chore: update SVG leaderboard",
              content: Buffer.from(svg).toString("base64"),
              sha: svgSha
            });
            console.log("SVG leaderboard generated with " + sorted.length + " contributors");
