name: Bot Health Dashboard
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
permissions:
  contents: write
  issues: write
  actions: read
jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Get workflow run stats
            const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
              owner, repo, per_page: 20, status: "completed"
            });

            const total = runs.workflow_runs.filter(r => r.conclusion !== "skipped" && r.conclusion !== "cancelled" && r.conclusion !== "action_required").length;
            const success = runs.workflow_runs.filter(r => r.conclusion === "success").length;
            const failure = runs.workflow_runs.filter(r => r.conclusion === "failure").length;
            const successRate = total > 0 ? Math.round(success / total * 100) : 0;

            // Get open issues/PRs
            const { data: repoInfo } = await github.rest.repos.get({ owner, repo });
            const openIssues = repoInfo.open_issues_count;

            const { data: prs } = await github.rest.pulls.list({ owner, repo, state: "open", per_page: 1 });
            const { data: allPrs } = await github.rest.pulls.list({ owner, repo, state: "open", per_page: 30 });
            const mergeable = allPrs.filter(p => p.mergeable === true).length;
            const conflicted = allPrs.filter(p => p.mergeable === false).length;

            const now = new Date().toISOString();
            const status = {
              lastCheck: now,
              successRate: successRate + "%",
              totalRuns: total,
              successRuns: success,
              failureRuns: failure,
              openIssues: openIssues,
              openPRs: allPrs.length,
              mergeablePRs: mergeable,
              conflictedPRs: conflicted,
              healthy: successRate >= 80
            };

            // Update BOT_STATUS.json
            let fileSha;
            try {
              const { data: fileInfo } = await github.rest.repos.getContent({
                owner, repo, path: "BOT_STATUS.json"
              });
              fileSha = fileInfo.sha;
            } catch (e) {
              fileSha = undefined;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path: "BOT_STATUS.json",
              message: "chore: update bot health status",
              content: Buffer.from(JSON.stringify(status, null, 2)).toString("base64"),
              sha: fileSha
            });

            // Create/update health dashboard issue
            const { data: existing } = await github.rest.issues.listForRepo({
              owner, repo, state: "open", labels: "bot-health", per_page: 1
            });

            const emoji = status.healthy ? "✅" : "⚠️";
            let body = `## ${emoji} Bot 健康面板

            | 指标 | 数值 |
            |:----|:----:|
            | 🕐 最后检查 | ${now.slice(0, 19)} |
            | 📊 成功率 | **${successRate}%** |
            | 🔄 总运行 | ${total} (成功 ${success} / 失败 ${failure}) |
            | 📂 Open Issues | ${openIssues} |
            | 📌 Open PRs | ${allPrs.length} |
            | ✅ 可合并 PRs | ${mergeable} |
            | ⛔ 冲突 PRs | ${conflicted} |
            | 💰 虚拟代币 | 仅供学习排名使用，不可兑换为现金或加密货币 |

            ${
              status.healthy
                ? "✅ 系统运行正常"
                : "⚠️ 系统异常率偏高，建议检查最近失败的 Workflow 运行"
            }
            `;

            if (existing.length > 0) {
              await github.rest.issues.update({
                issue_number: existing[0].number, owner, repo,
                title: `${emoji} Bot 健康状态 [${successRate}%]`,
                body: body
              });
            } else {
              await github.rest.issues.create({
                owner, repo,
                title: `${emoji} Bot 健康状态 [${successRate}%]`,
                body: body,
                labels: ["bot-health"]
              });
            }
            console.log("Health dashboard: " + successRate + "% success rate (" + success + "/" + total + ")");
